spring.application.name=notificationservice

spring.datasource.url=jdbc:postgresql://localhost:5432/jobservicedb
spring.datasource.username=postgres
spring.datasource.password=realkani

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.table=flyway_schema_history_notification

#Kafka
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.consumer.group-id=notificationservice-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*